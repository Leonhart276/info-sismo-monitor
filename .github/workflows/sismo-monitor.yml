name: Monitor Sismo Venezuela

on:
  schedule:
    # Runs hourly at minute 7. GitHub schedules use UTC.
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send a digest even if detected items were already seen"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: sismo-venezuela-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          # Channels
          SEND_DISCORD: "auto"
          SEND_EMAIL: "auto"

          # Discord
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MESSAGE_MODE: "compact"
          DISCORD_MAX_CHARS: "1800"
          DISCORD_STRICT: "false"

          # Email / SMTP
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_TLS: "true"
          SMTP_USE_SSL: "false"
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          EMAIL_STRICT: "false"

          # Monitor config
          DIGEST_TZ: America/Argentina/Buenos_Aires
          LOOKBACK_HOURS: "24"
          MIN_MAGNITUDE: "2.5"
          MAX_NEWS: "8"
          MAX_QUAKES: "8"
          SEND_EMPTY_DIGEST: "false"
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && inputs.force_send || false }}
        run: python src/sismo_monitor.py

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/state.json
            git commit -m "chore: update sismo monitor state"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          else
            echo "No state changes to commit."
          fi
